name: 일일 갱신

on:
  schedule:
    # 22:00 UTC = 07:00 KST (다음날). GitHub cron은 부하에 따라 수분 지연될 수 있다.
    - cron: "0 22 * * *"
  workflow_dispatch:        # 수동 실행 버튼
  push:
    branches: [main]
    # 코드나 기준 데이터가 바뀌면 바로 사이트에 반영한다.
    # 이게 없으면 푸시해도 다음 정기 실행까지 예전 화면이 그대로 뜬다.
    #
    # 이 잡은 data/prices.csv 를 되커밋하지만 무한 루프는 생기지 않는다.
    # GITHUB_TOKEN으로 만든 커밋은 새 워크플로 실행을 트리거하지 않는다.
    paths:
      - "**.py"
      - "data/*.csv"
      - ".github/workflows/daily.yml"

permissions:
  contents: write           # prices.csv 커밋
  pages: write              # Pages 배포
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: 수집 + 대시보드 생성 + 카카오 발송
        env:
          # 시크릿이 없으면 카카오 단계는 조용히 건너뛴다.
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          SITE_URL: https://zzzz118118-lab.github.io/investment/
        run: python run_daily.py

      - name: 데이터 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.csv data/fx.csv data/baseoil.csv data/lube.csv
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: $(date -u +%Y-%m-%d)"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
